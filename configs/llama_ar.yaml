
paradigm: autoregressive
model_name: meta-llama/Llama-3.1-8B
max_length: 2048

gradient_checkpointing: true

lora:
  r: 8
  alpha: 32
  dropout: 0.1
  target_modules: [q_proj, v_proj, k_proj, o_proj]

training:
  num_epochs: 3
  batch_size: 1
  grad_accum_steps: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 20
  grad_clip_norm: 1.0
  log_every: 10
  save_every: 100

data_dir: Data
output_dir: outputs/llama-clinical-summary-lora-ls

push_to_hub:
  enabled: false
  repo_id: CondeSoulrack/llama-clinical-summary-lora-ls
