
paradigm: diffusion
model_name: GSAI-ML/LLaDA-8B-Base
max_length: 2048

gradient_checkpointing: false

mask_token_id: 126336
diffusion:
  forward_eps: 1.0e-3

lora:
  r: 8
  alpha: 32
  dropout: 0.1
  target_modules: [q_proj, v_proj, k_proj, o_proj]

training:
  num_epochs: 3
  batch_size: 1
  grad_accum_steps: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 20
  grad_clip_norm: 1.0
  log_every: 10
  save_every: 100

data_dir: Data
output_dir: outputs/llada-clinical-summary-lora-ls

push_to_hub:
  enabled: false
  repo_id: CondeSoulrack/llada-clinical-summary-lora-ls
