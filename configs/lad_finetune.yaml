
paradigm: lad

base_model: meta-llama/Llama-3.1-8B-Instruct

checkpoint_repo: Ruurd/tini_model
checkpoint_file: diffusion-model-8B.pth

max_length: 2048
prediction_chunk: 2048

prompt_format: lad_assistant

lora:
  r: 8
  alpha: 32
  dropout: 0.1
  target_modules: [q_proj, v_proj, k_proj, o_proj]

training:
  num_epochs: 3
  batch_size: 1
  grad_accum_steps: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 20
  grad_clip_norm: 1.0
  fp16: true
  log_every: 10
  save_every: 1000000

fp32_trainable: true

data_dir: Data
output_dir: outputs/lad-clinical-summary

push_to_hub:
  enabled: false
  repo_id: CondeSoulrack/lad-clinical-summary
